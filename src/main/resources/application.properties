spring.application.name=${APPLICATION_NAME}
server.port=${SERVER_PORT}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=${API_DOCS_PATH}
springdoc.swagger-ui.path=${API_UI_PATH}
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

# ===== Email Configuration (JavaMailSender) =====
# Habilitar o deshabilitar el servicio de email (false para dev/test, true para prod)
notificaciones.email.enabled=${EMAIL_ENABLED:true}
# Dirección de correo del remitente de los emails
notificaciones.email.from=${EMAIL_FROM:sigea@nilver.store}
# Nombre del remitente que aparecerá en los emails (sin tildes para evitar problemas de codificacion)
notificaciones.email.nombre-remitente=${EMAIL_NOMBRE_REMITENTE:SIGEA - Sistema de Gestion}
# ============================
#      SMTP (Brevo Seguro)
# ============================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587

# Nunca exponer claves en el repo → usar variables de entorno
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Opciones SSL
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false

# Codificación
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.mime.charset=UTF-8


# ===== Media Storage Configuration =====
# Ubicación para almacenar archivos multimedia (informes, certificados PDF, etc.)
media.location=${MEDIA_LOCATION:./uploads}
