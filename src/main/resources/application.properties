spring.application.name=${APPLICATION_NAME}
server.port=${SERVER_PORT}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=${API_DOCS_PATH}
springdoc.swagger-ui.path=${API_UI_PATH}
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

# SQL con datos de prueba
spring.sql.init.mode=${SQL_INIT_MODE}
spring.sql.init.schema-locations=${SQL_INIT_SCHEMA_LOCATIONS}
spring.sql.init.data-locations=${SQL_INIT_DATA_LOCATIONS}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.encoding=UTF-8

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

informe.upload.dir=../uploads/informes/

# SecretKey para validacion de tokens
security.jwt.secret=${SECURITY_JWT_SECRET}

#Debug
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http.converter.json.MappingJackson2HttpMessageConverter=DEBUG

# ===== Email Configuration =====
# Habilitar o deshabilitar el servicio de email 
notificaciones.email.enabled=${EMAIL_ENABLED:true}
# Dirección de correo del remitente de los emails
notificaciones.email.from=${EMAIL_FROM:sigea@nombre.com}
# Nombre del remitente que aparecerá en los emails (sin tildes para evitar problemas de codificacion)
notificaciones.email.nombre-remitente=${EMAIL_NOMBRE_REMITENTE:SIGEA - Sistema de Gestion}
# ============================
#      SMTP
# ============================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}

# 
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}

spring.mail.properties.mail.smtp.auth=${SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTIONTIMEOUT}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITETIMEOUT}

# Opciones SSL
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_SSL_TRUST}
spring.mail.properties.mail.smtp.ssl.checkserveridentity=${SMTP_SSL_CHECKSERVERIDENTITY}

# Codificación
spring.mail.default-encoding=${MAIL_DEFAULT_ENCODING}
spring.mail.properties.mail.mime.charset=${MAIL_MIME_CHARSET}


# ===== Media Storage Configuration =====
# Ubicación para almacenar archivos multimedia (informes, certificados PDF, etc.)
media.location=${MEDIA_LOCATION:./uploads}