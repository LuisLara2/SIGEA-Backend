# El archivo application-test.properties, significa para definir las configuraciones
# del entorno de pruebas
# debe ser similar al archivo application.properties original pero
# con variables diferentes al del entorno original

# =========================
# APP
# =========================
spring.application.name=sigea-test
server.port=0

# =========================
# SUPABASE (mock)
# =========================
SUPABASE_URL=http://localhost:54321
SUPABASE_KEY=test-key

# =========================
# DATABASE (H2 para tests)
# =========================
# ;MODE=PostgreSQL, sirve para que H2 imite a PostgreSQL y se eviten errores
# con UUID
DB_URL=jdbc:h2:mem:testdb;MODE=PostgreSQL
DB_USERNAME=sa
DB_PASSWORD=
HIBERNATE_DDL_AUTO=create-drop

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# =========================
# SQL INIT
# =========================
SQL_INIT_MODE=never
SQL_INIT_SCHEMA_LOCATIONS=
SQL_INIT_DATA_LOCATIONS=

spring.sql.init.mode=${SQL_INIT_MODE}

# =========================
# JWT
# =========================
SECURITY_JWT_SECRET=mi_clave_super_segura_de_al_menos_32_caracteres_123_test_secret

# =========================
# MERCADO PAGO (mock)
# =========================
MERCADO_PAGO_PUBLIC_KEY=test-public
MERCADO_PAGO_ACCESS_TOKEN=test-token

# =========================
# EMAIL (desactivado en tests)
# =========================
EMAIL_ENABLED=false
EMAIL_FROM=test@test.com
EMAIL_NOMBRE_REMITENTE=TEST

MAIL_HOST=localhost
MAIL_PORT=1025
SMTP_USER=test
SMTP_PASS=test
SMTP_AUTH=false
SMTP_STARTTLS_ENABLE=false
SMTP_STARTTLS_REQUIRED=false
SMTP_CONNECTIONTIMEOUT=1000
SMTP_TIMEOUT=1000
SMTP_WRITETIMEOUT=1000
SMTP_SSL_TRUST=*
SMTP_SSL_CHECKSERVERIDENTITY=false
MAIL_DEFAULT_ENCODING=UTF-8
MAIL_MIME_CHARSET=UTF-8

# =========================
# MEDIA
# =========================
MEDIA_LOCATION=./uploads-test

# =========================
# DOMINIOS
# =========================
SIGEA_PUBLIC_BACKEND_DOMAIN=http://localhost
SIGEA_ALLOWED_ORIGIN_BACKEND_LOCALHOST_PATH=*
SIGEA_ALLOWED_ORIGIN_FRONTEND_LOCALHOST_PATH=*
SIGEA_PUBLIC_BACKEND_REPOSITORY=test-repo

# =========================
# GCP (DESACTIVADO)
# =========================
SPRING_CLOUD_GCP_SQL_ENABLED=false
SPRING_CLOUD_GCP_PUBSUB_ENABLED=false
SPRING_CLOUD_GCP_CORE_ENABLED=false

spring.cloud.gcp.sql.enabled=${SPRING_CLOUD_GCP_SQL_ENABLED}
spring.cloud.gcp.pubsub.enabled=${SPRING_CLOUD_GCP_PUBSUB_ENABLED}
spring.cloud.gcp.core.enabled=${SPRING_CLOUD_GCP_CORE_ENABLED}

# =========================
# LOGGING
# =========================
logging.level.org.springframework=ERROR
